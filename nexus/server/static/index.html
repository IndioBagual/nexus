<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS COCKPIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(1, 1fr);
            gap: 1.5rem;
        }
        @media (min-width: 1024px) {
            .bento-grid {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(2, minmax(250px, auto));
            }
            .col-span-2 { grid-column: span 2; }
            .row-span-2 { grid-row: span 2; }
        }
        .card { @apply bg-slate-800 rounded-xl p-6 shadow-lg border border-slate-700 flex flex-col; }
        .card-header { @apply text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 flex justify-between items-center; }
        body { @apply bg-slate-900 text-slate-100 font-sans; }
    </style>
</head>
<body class="p-6 h-screen overflow-hidden">

    <header class="mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight text-white">NEXUS <span class="text-cyan-400">OS</span></h1>
        <div id="status-indicator" class="text-xs text-green-500 font-mono">● SYSTEM ONLINE</div>
    </header>

    <div class="bento-grid h-full pb-10">
        
        <div class="card col-span-2 row-span-2 relative overflow-hidden">
            <div class="card-header">
                <span>Chronos / Today</span>
                <span id="date-display" class="text-slate-500">...</span>
            </div>
            <div id="chronos-list" class="space-y-3 overflow-y-auto pr-2 custom-scroll">
                <div class="animate-pulse bg-slate-700 h-10 rounded"></div>
            </div>
            <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-cyan-500/10 rounded-full blur-3xl"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>Character Status</span>
                <span id="level-badge" class="bg-cyan-900 text-cyan-300 px-2 py-0.5 rounded text-[10px]">LVL --</span>
            </div>
            <div id="rpg-stats" class="space-y-4 text-sm flex-1">
                <div class="animate-pulse bg-slate-700 h-4 rounded"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span>Treasury / Month</span>
                <span class="text-emerald-400">$</span>
            </div>
            <div class="flex flex-col items-center justify-center flex-1">
                <div class="text-3xl font-bold text-white mb-1">R$ <span id="treasury-total">--</span></div>
                <div id="treasury-cats" class="w-full mt-4 space-y-2 text-xs">
                    </div>
            </div>
        </div>

        <div class="card col-span-2">
            <div class="card-header">
                <span>Library / Recent</span>
                <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <div id="library-list" class="space-y-2 overflow-y-auto">
                 <div class="animate-pulse bg-slate-700 h-8 rounded"></div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
